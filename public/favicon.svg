<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="#00b5a3"/>
  <!-- Scissors blades -->
  <circle cx="20" cy="22" r="7" fill="none" stroke="white" stroke-width="3"/>
  <circle cx="44" cy="22" r="7" fill="none" stroke="white" stroke-width="3"/>
  <circle cx="20" cy="22" r="2.5" fill="white"/>
  <circle cx="44" cy="22" r="2.5" fill="white"/>
  <!-- Scissors handles crossing -->
  <line x1="25" y1="26" x2="46" y2="48" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="39" y1="26" x2="18" y2="48" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Wood plank line -->
  <line x1="12" y1="38" x2="52" y2="38" stroke="white" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 3" opacity="0.6"/>
</svg>
